version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "internal/db/migrations/000001_phase1_database_foundation.up.sql"
    queries:
      - "internal/db/query/product.sql"
      - "internal/db/query/cart.sql"
      - "internal/db/query/order.sql"
      - "internal/db/query/payment.sql"
      - "internal/db/query/outbox.sql"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        emit_empty_slices: true

